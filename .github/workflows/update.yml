name: 시장 지표 자동 업데이트

on:
  schedule:
    - cron: "0 6,14,22 * * 1-5"
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 데이터 수집
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          cd market-dashboard
          python fetch_data.py

      - name: data.json 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add market-dashboard/data.json
          git diff --staged --quiet || git commit -m "📊 지표 업데이트: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
